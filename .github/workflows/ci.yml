name: CI

# Build and run the unit tests on every push and pull request. Runs on Windows because the
# config tests exercise DPAPI, which is Windows only (the same platform the agent and tray run on).
on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run unit tests
        shell: pwsh
        run: dotnet test tests/AutoExporter.Contracts.Tests/AutoExporter.Contracts.Tests.csproj -c Release --nologo

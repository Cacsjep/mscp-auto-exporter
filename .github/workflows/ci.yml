name: CI

# Build and run the unit tests on every push and pull request. Runs on Windows because the
# config tests exercise DPAPI, which is Windows only (the same platform the agent and tray run on).
on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # Build the whole solution (Contracts, Agent, AdminPlugin, Tray, Tests) so a compile break in
      # any project fails CI, not just a test failure. CIBuild=true skips the local dev-deploy
      # targets (MIPPlugins copy, Event Server restart) that only make sense on a developer machine.
      # The Milestone SDK packages restore from nuget.org and the net48 targeting pack is present on
      # windows-latest.
      - name: Build solution (Release)
        shell: pwsh
        run: dotnet build AutoExporter.sln -c Release -p:CIBuild=true --nologo

      - name: Run unit tests
        shell: pwsh
        run: dotnet test tests/AutoExporter.Contracts.Tests/AutoExporter.Contracts.Tests.csproj -c Release --no-build --nologo
